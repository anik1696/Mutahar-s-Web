<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="QuizForge — AI-Powered Adaptive Quiz Management System for modern educators and learners." />
  <title>QuizForge — AI-Powered Quiz Management System</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Error Logger -->
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:monospace;width:100%;">' + 
        '<b>Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + ':' + e.colno + 
        '<br><pre>' + (e.error ? e.error.stack : '') + '</pre></div>';
    });
  </script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            heading: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
              950: '#1e1b4b',
            },
            violet: {
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
            },
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b',
              850: '#162032',
              900: '#0f172a',
              950: '#080d1a',
            }
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            'mesh-gradient': 'radial-gradient(ellipse at top left, rgba(99,102,241,0.15) 0%, transparent 50%), radial-gradient(ellipse at bottom right, rgba(139,92,246,0.15) 0%, transparent 50%)',
          },
          boxShadow: {
            'glow': '0 0 30px rgba(99,102,241,0.3)',
            'glow-sm': '0 0 15px rgba(99,102,241,0.2)',
            'card': '0 4px 24px rgba(0,0,0,0.4)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4,0,0.6,1) infinite',
            'shimmer': 'shimmer 2s linear infinite',
          },
          keyframes: {
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-12px)' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="font-sans bg-slate-50 dark:bg-black text-slate-800 dark:text-slate-100 antialiased overflow-x-hidden transition-colors duration-300 pt-12">
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
